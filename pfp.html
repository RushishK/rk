<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rushish Khandare — DevOps Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #0D1117;
      --card: #161B22;
      --card2: #1C2333;
      --purple: #A855F7;
      --purple2: #7E22CE;
      --purple3: #6D28D9;
      --text: #E6EDF3;
      --muted: #8B949E;
      --border: #30363D;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor-dot {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--purple);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s, opacity 0.2s;
      box-shadow: 0 0 18px 6px rgba(168,85,247,0.55);
    }
    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(168,85,247,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s, border-color 0.2s;
    }

    /* ── Loader ── */
    .loader-wrap {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9990;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .loader-wrap.hidden { opacity: 0; visibility: hidden; }
    .loader-ring {
      width: 64px; height: 64px;
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
    }

    /* ── Gradient mesh background ── */
    .mesh-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% -10%, rgba(126,34,206,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 110%, rgba(168,85,247,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(109,40,217,0.06) 0%, transparent 70%);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--purple2); border-radius: 9px; }

    /* ── Utility ── */
    .font-display { font-family: 'Syne', sans-serif; }
    .glass {
      background: rgba(22,27,34,0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(168,85,247,0.14);
    }
    .glow-purple { box-shadow: 0 0 30px rgba(168,85,247,0.25), 0 0 60px rgba(168,85,247,0.08); }
    .glow-sm     { box-shadow: 0 0 16px rgba(168,85,247,0.35); }
    .text-purple { color: var(--purple); }
    .border-purple { border-color: rgba(168,85,247,0.4); }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .navbar.scrolled {
      background: rgba(13,17,23,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 1px 0 rgba(168,85,247,0.12);
    }
    .nav-link {
      position: relative;
      transition: color 0.2s;
    }
    .nav-link::after {
      content: '';
      position: absolute; left: 0; bottom: -3px;
      width: 0; height: 1.5px;
      background: var(--purple);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after,
    .nav-link.active::after { width: 100%; }
    .nav-link.active { color: var(--purple); }

    /* ── Hero typing ── */
    .typing-cursor {
      display: inline-block;
      width: 3px; height: 1em;
      background: var(--purple);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Animated gradient text ── */
    .grad-text {
      background: linear-gradient(135deg, #A855F7 0%, #EC4899 45%, #A855F7 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradMove 4s ease infinite;
    }
    @keyframes gradMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Skill bar ── */
    .skill-bar-fill {
      height: 100%;
      border-radius: 9px;
      background: linear-gradient(90deg, var(--purple2), var(--purple));
      transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
    }
    .skill-bar-fill::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 40%, rgba(255,255,255,0.18) 60%, transparent 70%);
      animation: shimmer 2.2s ease infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* ── Card hover lift ── */
    .card-hover {
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      border: 1px solid var(--border);
    }
    .card-hover:hover {
      transform: translateY(-7px) scale(1.015);
      box-shadow: 0 20px 50px rgba(168,85,247,0.22), 0 0 30px rgba(168,85,247,0.12);
      border-color: rgba(168,85,247,0.45);
    }

    /* ── Skill icon card ── */
    .skill-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      transition: background 0.3s, box-shadow 0.3s;
      font-size: 1.6rem;
    }
    .card-hover:hover .skill-icon-wrap {
      background: rgba(168,85,247,0.2);
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }

    /* ── Timeline ── */
    .timeline-line {
      position: absolute; left: 20px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--purple), transparent);
    }
    .timeline-dot {
      position: absolute; left: 12px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--purple);
      border: 3px solid var(--bg);
      box-shadow: 0 0 12px rgba(168,85,247,0.6);
      animation: pulseGlow 2.5s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(168,85,247,0.6); }
      50%       { box-shadow: 0 0 22px rgba(168,85,247,1), 0 0 40px rgba(168,85,247,0.4); }
    }

    /* ── Social icons ── */
    .social-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      background: var(--card);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s, background 0.3s;
      font-size: 1.4rem;
      text-decoration: none;
      color: var(--text);
    }
    .social-icon:hover {
      transform: translateY(-5px) scale(1.08);
      box-shadow: 0 0 24px rgba(168,85,247,0.55);
      border-color: rgba(168,85,247,0.6);
      background: rgba(168,85,247,0.12);
      color: var(--purple);
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, var(--purple2), var(--purple));
      color: white;
      border: none;
      position: relative; overflow: hidden;
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--purple), var(--purple2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover {
      box-shadow: 0 0 28px rgba(168,85,247,0.7), 0 8px 20px rgba(126,34,206,0.4);
      transform: translateY(-2px);
    }
    .btn-primary span { position: relative; z-index: 1; }

    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(168,85,247,0.5);
      color: var(--purple);
      transition: background 0.3s, box-shadow 0.3s, transform 0.2s, border-color 0.3s;
    }
    .btn-outline:hover {
      background: rgba(168,85,247,0.1);
      box-shadow: 0 0 20px rgba(168,85,247,0.35);
      border-color: var(--purple);
      transform: translateY(-2px);
    }

    /* ── Form inputs ── */
    .form-input {
      background: rgba(22,27,34,0.8);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.18), 0 0 20px rgba(168,85,247,0.2);
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }
    .reveal-delay-5 { transition-delay: 0.5s; }

    /* ── Scroll to top ── */
    .scroll-top {
      position: fixed; right: 24px; bottom: 28px;
      width: 46px; height: 46px;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--purple2), var(--purple));
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 0 22px rgba(168,85,247,0.5);
      transition: opacity 0.3s, transform 0.3s;
      border: none;
    }
    .scroll-top.hidden { opacity: 0; pointer-events: none; transform: translateY(10px); }
    .scroll-top:hover { transform: translateY(-3px) scale(1.06); }

    /* ── Section heading ── */
    .section-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.25);
      color: var(--purple);
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Project card image placeholder ── */
    .proj-img {
      width: 100%; height: 180px;
      background: linear-gradient(135deg, rgba(126,34,206,0.2), rgba(168,85,247,0.08));
      border-bottom: 1px solid rgba(168,85,247,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }
    .proj-img::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent 0px, transparent 18px,
        rgba(168,85,247,0.04) 18px, rgba(168,85,247,0.04) 19px
      );
    }

    /* ── Tech badge ── */
    .tech-badge {
      display: inline-block;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--purple);
      padding: 3px 10px;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 88px; right: 20px;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 500;
      z-index: 9000;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      min-width: 240px;
    }
    .toast.show { transform: translateX(0); }
    .toast.success {
      background: rgba(22,27,34,0.95);
      border: 1px solid rgba(74,222,128,0.35);
      color: #4ade80;
      box-shadow: 0 0 24px rgba(74,222,128,0.2);
    }
    .toast.error {
      background: rgba(22,27,34,0.95);
      border: 1px solid rgba(248,113,113,0.35);
      color: #f87171;
      box-shadow: 0 0 24px rgba(248,113,113,0.2);
    }

    /* ── Grid lines BG decoration ── */
    .grid-bg {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(168,85,247,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.035) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Floating orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) translateX(0); }
      33%       { transform: translateY(-30px) translateX(15px); }
      66%       { transform: translateY(20px) translateX(-10px); }
    }

    /* ── Mobile menu ── */
    .mobile-menu {
      background: rgba(13,17,23,0.97);
      backdrop-filter: blur(30px);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    }
    .mobile-menu.closed { transform: translateY(-110%); opacity: 0; pointer-events: none; }
    .mobile-menu.open  { transform: translateY(0);    opacity: 1; }

    /* ── Hero particles ── */
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--purple);
      opacity: 0.5;
      animation: particleRise linear infinite;
    }
    @keyframes particleRise {
      0%   { transform: translateY(0) scale(1);   opacity: 0.5; }
      100% { transform: translateY(-120vh) scale(0); opacity: 0; }
    }
    
    /* ── Profile placeholder ── */
    .profile-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(126,34,206,0.3), rgba(168,85,247,0.15));
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      color: rgba(168,85,247,0.5);
      position: relative;
      overflow: hidden;
    }
    .profile-placeholder::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 40%, rgba(168,85,247,0.2) 0%, transparent 70%);
    }
  </style>
</head>
<body>

<div class="mesh-bg"></div>
<div id="cursor-dot"  class="cursor-dot"></div>
<div id="cursor-ring" class="cursor-ring"></div>

<!-- Loader -->
<div class="loader-wrap" id="loader">
  <div style="text-align:center">
    <div class="loader-ring" style="margin:0 auto 20px"></div>
    <p style="font-family:'Syne',sans-serif;color:var(--purple);font-size:0.85rem;letter-spacing:0.15em;text-transform:uppercase">Loading</p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Scroll to top -->
<button class="scroll-top hidden" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Typing effect hook ─── */
function useTyping(words, speed=90, pause=1800) {
  const [display, setDisplay] = useState('');
  const [wIdx, setWIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const word = words[wIdx % words.length];
    let timeout;
    if (!deleting && charIdx <= word.length) {
      timeout = setTimeout(() => {
        setDisplay(word.slice(0, charIdx));
        setCharIdx(c => c + 1);
      }, charIdx === word.length ? pause : speed);
    } else if (deleting && charIdx >= 0) {
      timeout = setTimeout(() => {
        setDisplay(word.slice(0, charIdx));
        setCharIdx(c => c - 1);
      }, speed / 2);
    }
    if (!deleting && charIdx > word.length) {
      setDeleting(true);
    } else if (deleting && charIdx < 0) {
      setDeleting(false);
      setWIdx(i => i + 1);
      setCharIdx(0);
    }
    return () => clearTimeout(timeout);
  }, [charIdx, deleting, wIdx]);

  return display;
}

/* ─── Scroll reveal hook ─── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

/* ─── Active nav ─── */
function useActiveNav() {
  const [active, setActive] = useState('hero');
  useEffect(() => {
    const sections = document.querySelectorAll('section[id]');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) setActive(e.target.id);
      });
    }, { threshold: 0.4 });
    sections.forEach(s => obs.observe(s));
    return () => obs.disconnect();
  }, []);
  return active;
}

/* ─── Skill bar with animation ─── */
function SkillBar({ label, pct, delay = 0 }) {
  const [w, setW] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => setW(pct), delay); obs.disconnect(); }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className="mb-3">
      <div className="flex justify-between mb-1">
        <span style={{fontSize:'0.82rem',color:'var(--muted)',fontWeight:500}}>{label}</span>
        <span style={{fontSize:'0.82rem',color:'var(--purple)',fontWeight:600}}>{pct}%</span>
      </div>
      <div style={{height:'6px',background:'rgba(168,85,247,0.1)',borderRadius:'9px',overflow:'hidden'}}>
        <div className="skill-bar-fill" style={{width:`${w}%`}} />
      </div>
    </div>
  );
}

/* ─── Particles ─── */
function Particles() {
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
      {[...Array(18)].map((_,i) => (
        <div key={i} className="particle" style={{
          left: `${Math.random()*100}%`,
          bottom: `-${Math.random()*20}%`,
          animationDuration: `${6 + Math.random()*8}s`,
          animationDelay: `${Math.random()*6}s`,
          opacity: 0.15 + Math.random()*0.4,
          width: `${2 + Math.random()*3}px`,
          height: `${2 + Math.random()*3}px`,
        }} />
      ))}
    </div>
  );
}

/* ─── Navbar ─── */
function Navbar({ active }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const links = ['hero','about','skills','education','projects','contact'];

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const scrollTo = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
    setMobileOpen(false);
  };

  return (
    <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
      <div style={{maxWidth:'1200px',margin:'0 auto',padding:'18px 24px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div onClick={() => scrollTo('hero')} style={{cursor:'pointer',display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{width:'36px',height:'36px',borderRadius:'10px',background:'linear-gradient(135deg,var(--purple2),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Syne',fontWeight:800,fontSize:'1rem',color:'white'}}>RK</div>

/* ─── Contact ─── */
function Contact() {
  const [form, setForm] = useState({ name:'', email:'', message:'' });
  const [sending, setSending] = useState(false);

  const showToast = (msg, type) => {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 4000);
  };

  const handleSubmit = async () => {
    if (!form.name || !form.email || !form.message) {
      showToast('⚠️ Please fill in all fields.', 'error'); return;
    }
    setSending(true);
    try {
      // FormSubmit backend-free email
      const res = await fetch('https://formsubmit.co/ajax/Vexo0919@gmail.com', {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({ name: form.name, email: form.email, message: form.message, _subject: `Portfolio Contact: ${form.name}` })
      });
      const data = await res.json();
      if (data.success === 'true' || data.success === true) {
        showToast('✅ Message sent! I\'ll get back to you soon.', 'success');
        setForm({ name:'', email:'', message:'' });
      } else {
        showToast('❌ Something went wrong. Try emailing directly.', 'error');
      }
    } catch {
      showToast('❌ Network error. Please try again.', 'error');
    } finally {
      setSending(false);
    }
  };

  return (
    <section id="contact" style={{padding:'100px 24px',position:'relative',background:'rgba(22,27,34,0.4)'}}>
      <div className="grid-bg"></div>
      <div className="orb" style={{width:'400px',height:'400px',background:'rgba(126,34,206,0.12)',top:'50%',left:'50%',transform:'translate(-50%,-50%)'}}></div>

      <div style={{maxWidth:'680px',margin:'0 auto',position:'relative',zIndex:1}}>
        <div className="reveal" style={{textAlign:'center',marginBottom:'48px'}}>
          <div className="section-badge" style={{marginBottom:'16px'}}>Contact</div>
          <h2 className="font-display" style={{fontSize:'clamp(2rem,4vw,3rem)',fontWeight:800,letterSpacing:'-0.02em',marginBottom:'14px'}}>Let's Build Something Together</h2>
          <p style={{color:'var(--muted)',fontSize:'1rem'}}>Have a project in mind or want to chat? Drop me a message!</p>
        </div>

        <div className="reveal glass glow-purple" style={{borderRadius:'24px',padding:'36px',border:'1px solid rgba(168,85,247,0.18)'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
            <div>
              <label style={{display:'block',fontSize:'0.82rem',color:'var(--muted)',marginBottom:'8px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}}>Name</label>
              <input className="form-input" type="text" placeholder="Rushish Khandare"
                value={form.name} onChange={e => setForm(f => ({...f, name:e.target.value}))} />
            </div>
            <div>
              <label style={{display:'block',fontSize:'0.82rem',color:'var(--muted)',marginBottom:'8px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}}>Email</label>
              <input className="form-input" type="email" placeholder="you@example.com"
                value={form.email} onChange={e => setForm(f => ({...f, email:e.target.value}))} />
            </div>
          </div>
          <div style={{marginBottom:'24px'}}>
            <label style={{display:'block',fontSize:'0.82rem',color:'var(--muted)',marginBottom:'8px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}}>Message</label>
            <textarea className="form-input" rows="5" placeholder="Tell me about your project, opportunity, or just say hi..."
              value={form.message} onChange={e => setForm(f => ({...f, message:e.target.value}))}
              style={{resize:'vertical',minHeight:'140px'}} />
          </div>

          <button className="btn-primary" onClick={handleSubmit} disabled={sending}

/* ─── App ─── */
function App() {
  const active = useActiveNav();
  useReveal();

  useEffect(() => {
    // Loader
    setTimeout(() => document.getElementById('loader')?.classList.add('hidden'), 1200);

    // Scroll top button
    const onScroll = () => {
      const btn = document.getElementById('scrollTop');
      if (!btn) return;
      if (window.scrollY > 400) btn.classList.remove('hidden');
      else btn.classList.add('hidden');
    };
    window.addEventListener('scroll', onScroll);

    // Custom cursor
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;
    const onMove = (e) => {
      const { clientX: x, clientY: y } = e;
      if (dot)  { dot.style.left  = x+'px'; dot.style.top  = y+'px'; }
      rx += (x - rx) * 0.14;
      ry += (y - ry) * 0.14;
    };
    const animate = () => {
      if (ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
      requestAnimationFrame(animate);
    };
    window.addEventListener('mousemove', onMove);
    animate();

    // Cursor scale on hover
    const onEnter = () => { if(ring){ring.style.width='56px';ring.style.height='56px';ring.style.borderColor='rgba(168,85,247,0.7)';} };
    const onLeave = () => { if(ring){ring.style.width='36px';ring.style.height='36px';ring.style.borderColor='rgba(168,85,247,0.5)';} };
    document.querySelectorAll('a,button').forEach(el => { el.addEventListener('mouseenter',onEnter); el.addEventListener('mouseleave',onLeave); });

    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('mousemove', onMove); };
  }, []);

  return (
    <div style={{position:'relative',zIndex:2}}>
      <Navbar active={active} />
      <Hero />
      <About />
      <Skills />
      <Education />
      <Projects />
      <Social />
      <Contact />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
